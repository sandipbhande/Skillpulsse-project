version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillpulse-backend
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
    networks:
      - skillpulse-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillpulse-frontend
    ports:
      - '4173:4173'
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api
    depends_on:
      - backend
    networks:
      - skillpulse-net

networks:
  skillpulse-net:
    driver: bridge
